# =============================================================================
# Local dev infrastructure — mirrors the Render production topology.
# - Postgres 16 with pgvector preinstalled (image: pgvector/pgvector)
# - Redis 7 for sessions, carts, and pub/sub
# Volumes are namespaced so `pnpm infra:down -v` cleanly resets state.
# =============================================================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smart-dining-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dining
      POSTGRES_PASSWORD: dining
      POSTGRES_DB: dining
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dining -d dining']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: smart-dining-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory-policy', 'allkeys-lru']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
    name: smart-dining-postgres-data
  redis-data:
    name: smart-dining-redis-data
